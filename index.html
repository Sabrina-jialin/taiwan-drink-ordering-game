<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台灣飲料點餐練習站</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button class="brand" onclick="setPage('home')" aria-label="回首頁">
      <div class="logo-cup"><span class="straw"></span>🧋</div>
      <div>
        <h1>台灣飲料點餐練習站</h1>
        <p>麻古茶坊風模擬點餐</p>
      </div>
    </button>

    <nav class="nav">
      <button class="nav-btn active" data-page="home" onclick="setPage('home')">🏠 首頁</button>
      <button class="nav-btn" data-page="order" onclick="setPage('order')">🥤 開始點餐</button>
      <button class="nav-btn" data-page="listen" onclick="setPage('listen')">🎧 聽力練習</button>
      <button class="nav-btn" data-page="speak" onclick="setPage('speak')">🎙️ 口說練習</button>
      <button class="nav-btn" data-page="phrases" onclick="setPage('phrases')">💬 常用句型</button>
      <button class="nav-btn" data-page="cart" onclick="setPage('cart')">🛍️ 我的訂單</button>
      <button id="englishToggle" class="tool-btn" onclick="toggleEnglish()">英文：關</button>
      <button id="pinyinToggle" class="tool-btn" onclick="togglePinyin()">拼音：關</button>
    </nav>
  </header>

  <main id="app"></main>

  <footer class="footer">
    <div>⭐ 情境模擬真實點餐</div>
    <div>🎧 聽說全面提升</div>
    <div>🥤 認識台灣飲料文化</div>
    <div>🛡️ 安全友善練習環境</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
